<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>커뮤니티 센터 오픈 진행상황 안내 - JSON v2 테스트</title>
<style>
  :root{--bg:#f5f7fb;--panel:#fff;--line:#dfe6ef;--text:#17212b;--sub:#556372;--muted:#7a8794;--green:#2e8b57;--green-soft:#e9f7ef;--blue:#2d6cdf;--blue-soft:#eef4ff;--amber:#d28a16;--amber-soft:#fff6e5;--teal:#1f8b8d;--teal-soft:#ebfbfb;--shadow:0 10px 30px rgba(20,34,60,.08);--radius:20px}
  *{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;line-height:1.55}.page{max-width:1100px;margin:0 auto;padding:18px 16px 48px}
  .hero{background:linear-gradient(135deg,#eaf3ff 0%,#f1fbff 100%);border:1px solid #d9e7fb;border-radius:28px;padding:26px;box-shadow:var(--shadow)}.eyebrow{display:inline-flex;background:#fff;border:1px solid #dbe6f5;color:var(--blue);padding:7px 12px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:14px}h1{font-size:34px;line-height:1.28;margin:0 0 10px}.lead{font-size:17px;color:var(--sub);max-width:900px;margin:0}
  .grid{display:grid;gap:16px}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr));margin-top:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.card-body{padding:20px}.mini-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase}.big{font-size:28px;font-weight:800;line-height:1.3;margin-bottom:8px}.desc{font-size:15px;color:var(--sub)}.highlight{background:var(--blue-soft);border-color:#d5e4ff}.note{background:#fffef9;border-color:#f0e4be}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;font-size:13px;font-weight:700}.chip.green{background:var(--green-soft);color:var(--green)}.chip.blue{background:var(--blue-soft);color:var(--blue)}.chip.amber{background:var(--amber-soft);color:var(--amber)}.inline-stage-pill{display:inline-flex;padding:2px 9px;margin:0 4px;border-radius:999px;background:#e8f1ff;color:var(--blue);font-size:12px;font-weight:900;border:1px solid rgba(45,108,223,.12)}
  .proposal-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.proposal-btn{display:inline-flex;padding:8px 14px;border-radius:10px;background:var(--blue-soft);color:var(--blue);font-size:14px;font-weight:800;text-decoration:none;border:1px solid #d5e4ff}.proposal-btn.small{padding:7px 12px;font-size:13px}.proposal-note{font-size:12px;color:var(--sub);margin-top:6px}
  .section{margin-top:22px}.section-title{font-size:25px;font-weight:900;margin:0 0 12px}.section-sub{font-size:14px;color:var(--sub);margin:0 0 18px}.overview{padding:18px}.step-list{position:relative;padding-left:8px}.step-list:before{content:"";position:absolute;left:43px;top:18px;bottom:18px;width:3px;background:#d7dee8;border-radius:3px}
  .step{position:relative;display:flex;gap:14px;padding:7px 0}.num{width:70px;height:36px;flex:0 0 70px;border-radius:999px;display:grid;place-items:center;font-size:15px;font-weight:900;background:#dcefe8;color:#215d45;position:relative;z-index:1;border:2px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.06)}.step.current .num{background:var(--blue);color:#fff}.step.future .num{background:#f5ddb0;color:#7c5313}
  .step-card{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 14px}.step.done .step-card{background:#fcfefd}.step.current .step-card{background:#f6faff;border-color:#cfe1ff}.step.future .step-card{background:#fffaf0;border-color:#f2ddb0}.step-line{display:flex;align-items:center;gap:10px;min-width:0}.step-title{font-size:18px;font-weight:900;margin:0;line-height:1.25}.step-desc{font-size:13px;color:var(--sub);margin-top:4px;line-height:1.45}.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;flex:0 0 auto}.pill.done{background:var(--green-soft);color:var(--green)}.pill.current{background:var(--blue-soft);color:var(--blue)}.pill.future{background:var(--amber-soft);color:var(--amber)}
  .callout{margin-top:18px;padding:18px;border-radius:18px;background:#f7fbff;border:1px solid #d9e8fb}.callout ul{margin:10px 0 0 18px;padding:0}.callout li{margin:6px 0;color:var(--sub)}
  details.group{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}details.group summary{list-style:none;cursor:pointer;padding:18px 20px;display:flex;gap:12px;background:#fbfdff}details.group summary::-webkit-details-marker{display:none}.summary-left{flex:1}.stage-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}.stage-pill-detail{display:inline-flex;padding:6px 14px;border-radius:999px;background:#dfeee9;color:#2a7160;font-size:18px;font-weight:900;border:2px solid #fff}.stage-title-text{font-size:19px;font-weight:900}.summary-desc{font-size:14px;color:var(--sub)}.summary-badge{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap;background:#eff4f9;color:#4a5a6a}
  details.group.status-done{border-color:#cfe6dc;background:#fcfffd}details.group.status-done summary{background:#f3fbf7}details.group.status-done .summary-badge{background:#e9f7ef;color:var(--green)}details.group.status-current{border-color:#cfe1ff;background:#fbfdff}details.group.status-current summary{background:#f1f6ff}details.group.status-current .summary-badge{background:#eef4ff;color:var(--blue)}details.group.status-current .stage-pill-detail{background:var(--blue);color:#fff}details.group.status-future{border-color:#f0ddb5;background:#fffdf8}details.group.status-future summary{background:#fff7e8}details.group.status-future .summary-badge{background:#fff6e5;color:var(--amber)}details.group.status-future .stage-pill-detail{background:#f5ddb0;color:#7c5313}
  .timeline{padding:0 20px 20px}.item{display:grid;grid-template-columns:150px 1fr;gap:12px;padding:14px 0;border-top:1px dashed #e1e7ef}.date{font-size:13px;font-weight:800;color:#3a5871}.item-main{font-size:16px;font-weight:800}.item-sub{font-size:14px;color:var(--sub);margin-top:5px}.detail-label{font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:2px;text-transform:uppercase;font-weight:800}.label-box{display:inline-block;border-radius:10px;padding:2px 8px;font-size:12px;font-weight:800;margin-right:6px;margin-top:6px}.lb-green{background:var(--green-soft);color:var(--green)}.lb-amber{background:var(--amber-soft);color:var(--amber)}.lb-blue{background:var(--blue-soft);color:var(--blue)}.lb-teal{background:var(--teal-soft);color:var(--teal)}
  .vote-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:9px}.vote-box{background:#f6f8fb;border:1px solid #e1e7ef;border-radius:12px;padding:9px 11px}.vote-label{font-size:11px;color:var(--sub);font-weight:800;margin-bottom:3px}.vote-value{font-size:18px;color:var(--text);font-weight:900}.vote-note{font-size:12px;color:var(--sub);margin-top:6px}.vote-result{display:inline-flex;margin-top:8px;padding:4px 10px;border-radius:999px;background:#e9f7ef;color:var(--green);font-size:12px;font-weight:900}.footer-note{margin-top:20px;padding:18px 20px;border-radius:18px;background:#fff;border:1px solid var(--line)}.footer-note strong{display:block;margin-bottom:8px}.page-break{height:20px}.load-error{background:#fff0f0;border:1px solid #f0c4c4;color:#8a2020;border-radius:18px;padding:18px}
  @media (max-width:860px){.grid-3{grid-template-columns:1fr}.item{grid-template-columns:1fr}.date{margin-bottom:2px}h1{font-size:28px}.stage-title-text{font-size:18px}}
</style>
</head>
<body>
<div class="page" id="editable-root">
  <div id="app">불러오는 중...</div>
</div>
<script src="./assets/js/community-status.js"></script>
</body>
</html>
